<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찾아볼까나</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.8rem; color: #2c3e50; }
        .header .sub-title { font-size: 0.9rem; color: #7f8c8d; margin-top: 5px; line-height: 1.4; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 20px; }
        .result-item { padding: 15px; border-bottom: 1px solid #eee; line-height: 1.6; }
        
        /* 韓国語/見出し語: 青色 + 太字 */
        .word { font-weight: bold; color: #0077cc; font-size: 1.2rem; margin-right: 10px; }
        /* 日本語/意味: 黒 */
        .meaning { font-size: 1.1rem; color: #333; }
        .memo { display: block; font-size: 0.9rem; color: #7f8c8d; margin-top: 4px; }
        
        /* 強調スタイル */
        .highlight-kr { text-decoration: underline; text-underline-offset: 3px; }
        .highlight-jp { text-decoration: underline; font-weight: bold; text-underline-offset: 3px; }
        
        ruby rt { font-size: 0.6em; color: #3498db; }
        /* 上付き数字: 灰色 */
        sup { font-size: 0.6em; color: #95a5a6; vertical-align: super; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>찾아볼까나</h1>
        <div class="sub-title">チャジャボルカナ<br>韓国語初級学習者向け簡易辞書</div>
    </div>
    <input type="text" id="searchInput" placeholder="読み込み中..." disabled oninput="search()">
    <div id="results"></div>
</div>

<script>
    let dictionary = [];   // data.csv 用
    let dictionaryJK = []; // data_jk.csv 用

    function parseCSV(text) {
        const result = [];
        let row = [], col = "", inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let char = text[i], next = text[i+1];
            if (inQuotes && char === '"' && next === '"') { col += '"'; i++; continue; }
            if (char === '"') { inQuotes = !inQuotes; continue; }
            if (char === ',' && !inQuotes) { row.push(col); col = ""; continue; }
            if ((char === '\r' || char === '\n') && !inQuotes) {
                if (char === '\r' && next === '\n') i++;
                row.push(col); result.push(row); row = []; col = ""; continue;
            }
            col += char;
        }
        if (col || row.length > 0) { row.push(col); result.push(row); }
        return result;
    }

    async function loadCSV() {
        try {
            const [resp1, resp2] = await Promise.all([
                fetch('data.csv'),
                fetch('data_jk.csv')
            ]);

            if (!resp1.ok || !resp2.ok) throw new Error("File not found");

            const text1 = await resp1.text();
            const text2 = await resp2.text();

            // data.csv の処理
            // 構造: [Korean_word, Japanese_meaning, memo]
            // 表示: ①韓国語(word/青) ②日本語(meaning/黒) ③メモ(灰)
            const rows1 = parseCSV(text1);
            const headers1 = rows1[0];
            const idxKr = headers1.indexOf('Korean_word'), idxJp = headers1.indexOf('Japanese_meaning'), idxMemo = headers1.indexOf('memo');
            
            dictionary = rows1.slice(1).map(cols => ({
                word: (cols[idxKr] || "").trim(),     // ① 青色・太字
                meaning: (cols[idxJp] || "").trim(),  // ② 黒色
                memo: (cols[idxMemo] || "").trim()    // ③ 灰色
            })).filter(item => item.word || item.meaning);

            // data_jk.csv の処理
            // 構造: [?, 漢字, ひらがな, 韓国語訳, 解説]
            // 表示: ①日本語(word/青) ②韓国語訳(meaning/黒) ③解説(memo/灰)
            const rows2 = parseCSV(text2);
            dictionaryJK = rows2.slice(1).map(cols => {
                const kanji = (cols[1] || "").trim();
                const kana = (cols[2] || "").trim();
                const krWord = (cols[3] || "").trim();
                const desc = (cols[4] || "").trim();
                
                // 日本語見出しを作成
                const jpCombined = kanji === kana ? kanji : `${kanji}（${kana}）`;

                return {
                    word: jpCombined,   // ① 青色・太字 (日本語)
                    meaning: krWord,    // ② 黒色 (韓国語)
                    memo: desc          // ③ 灰色 (解説)
                };
            }).filter(item => item.word || item.meaning);

            const input = document.getElementById('searchInput');
            input.placeholder = "単語検索..."; input.disabled = false;
        } catch (e) {
            console.error(e);
            document.getElementById('searchInput').placeholder = "エラー: 読み込めませんでした";
        }
    }

    function highlightText(text, query, className) {
        if (!query) return text;
        const re = new RegExp(`(${query})`, 'gi');
        return text.replace(re, `<span class="${className}">$1</span>`);
    }

    function formatDisplay(item, query) {
        // word (① 青色部分) の整形
        let wordTag = item.word.replace(/(\d+)$/, '<sup>$1</sup>');
        
        // meaning (② 黒色部分) の整形
        // data.csvの場合はここにルビ記法が含まれる可能性があるため処理する
        let meaningTag = item.meaning
            .replace(/\[(.*?)>(.*?)\]/g, '<ruby>$1<rt>$2</rt></ruby>')
            .replace(/(.)\[(.*?)\]/g, '<ruby>$1<rt>$2</rt></ruby>');

        return `
            <div class="result-item">
                <span class="word">${highlightText(wordTag, query, 'highlight-kr')}</span>
                <span class="meaning">${highlightText(meaningTag, query, 'highlight-jp')}</span>
                ${(item.memo && item.memo !== "" && item.memo !== "NaN") ? `<span class="memo">＊${item.memo}</span>` : ""}
            </div>
        `;
    }

    function searchInList(list, query) {
        const qLower = query.toLowerCase();
        const startsWith = [];
        const contains = [];

        list.forEach(item => {
            // word(青) と meaning(黒) の両方を検索対象にする
            const wLower = item.word.toLowerCase();
            const mLower = item.meaning.toLowerCase();
            
            if (wLower.startsWith(qLower) || mLower.startsWith(qLower)) {
                startsWith.push(item);
            } else if (wLower.includes(qLower) || mLower.includes(qLower)) {
                contains.push(item);
            }
        });
        return [...startsWith, ...contains];
    }

    function search() {
        const query = document.getElementById('searchInput').value.trim();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        if (!query) return;

        // 韓国語判定 (ハングルが含まれているか)
        const isKoreanQuery = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(query);

        let finalResults = [];

        if (isKoreanQuery) {
            // 韓国語検索: data.csv(通常) -> data_jk.csv(逆引き)
            const res1 = searchInList(dictionary, query);
            const res2 = searchInList(dictionaryJK, query);
            finalResults = [...res1, ...res2];
        } else {
            // 日本語検索: data_jk.csv(逆引き) -> data.csv(通常)
            const resJK = searchInList(dictionaryJK, query);
            const resData = searchInList(dictionary, query);
            finalResults = [...resJK, ...resData];
        }

        resultsDiv.innerHTML = finalResults.map(item => formatDisplay(item, query)).join('');
    }

    loadCSV();
</script>
</body>
</html>
